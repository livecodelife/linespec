openapi: 3.0.3
info:
  title: Todo API Service
  description: |
    RESTful API for managing todo items. All endpoints require authentication
    via Bearer token which is validated against the user service.
  version: 1.0.0
  contact:
    name: Todo API Team

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server

paths:
  /todos:
    get:
      summary: List all todos
      description: |
        Retrieve a list of all todo items for the authenticated user.
        Requires valid Bearer token in Authorization header.
      operationId: listTodos
      tags:
        - Todos
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved list of todos
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items:
                      $ref: '#/components/schemas/Todo'
                example:
                  rows:
                    - id: 1
                      title: "Buy groceries"
                      description: "Milk, eggs, and bread"
                      completed: false
                      user_id: 42
                      created_at: "2026-02-25T10:00:00Z"
                      updated_at: "2026-02-25T10:00:00Z"
                    - id: 2
                      title: "Finish report"
                      description: "Complete the quarterly report"
                      completed: true
                      user_id: 42
                      created_at: "2026-02-25T09:00:00Z"
                      updated_at: "2026-02-25T09:30:00Z"
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a new todo
      description: |
        Create a new todo item for the authenticated user.
        The user_id is automatically set based on the authenticated user.
      operationId: createTodo
      tags:
        - Todos
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoRequest'
            example:
              title: "Buy groceries"
              description: "Milk, eggs, and bread"
              completed: false
      responses:
        '201':
          description: Todo successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
              example:
                id: 1
                title: "Buy groceries"
                description: "Milk, eggs, and bread"
                completed: false
                user_id: 42
                created_at: "2026-02-25T10:00:00Z"
                updated_at: "2026-02-25T10:00:00Z"
        '400':
          description: Bad request - Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable Entity - Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /todos/{id}:
    get:
      summary: Get a specific todo
      description: |
        Retrieve a single todo item by ID. The todo must belong to
        the authenticated user.
      operationId: getTodo
      tags:
        - Todos
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Todo ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Successfully retrieved todo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
              example:
                id: 1
                title: "Buy groceries"
                description: "Milk, eggs, and bread"
                completed: false
                user_id: 42
                created_at: "2026-02-25T10:00:00Z"
                updated_at: "2026-02-25T10:00:00Z"
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Todo not found or does not belong to user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update a todo
      description: |
        Update an existing todo item. The todo must belong to the
        authenticated user. Partial updates are supported.
      operationId: updateTodo
      tags:
        - Todos
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Todo ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoRequest'
            example:
              title: "Buy groceries"
              description: "Milk, eggs, and bread - organic only"
              completed: false
      responses:
        '200':
          description: Todo successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
              example:
                id: 1
                title: "Buy groceries"
                description: "Milk, eggs, and bread - organic only"
                completed: false
                user_id: 42
                created_at: "2026-02-25T10:00:00Z"
                updated_at: "2026-02-25T11:00:00Z"
        '400':
          description: Bad request - Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Todo not found or does not belong to user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Unprocessable Entity - Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a todo
      description: |
        Delete a todo item. The todo must belong to the authenticated user.
      operationId: deleteTodo
      tags:
        - Todos
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Todo ID
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Todo successfully deleted
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Todo not found or does not belong to user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Todo:
      type: object
      description: A todo item belonging to a user
      required:
        - id
        - title
        - description
        - completed
        - user_id
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          description: Unique todo identifier
          example: 1
        title:
          type: string
          description: Title of the todo
          example: "Buy groceries"
        description:
          type: string
          description: Detailed description of the todo
          example: "Milk, eggs, and bread"
        completed:
          type: boolean
          description: Whether the todo is completed
          example: false
        user_id:
          type: integer
          description: ID of the user who owns this todo
          example: 42
        created_at:
          type: string
          format: date-time
          description: Timestamp when the todo was created
          example: "2026-02-25T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the todo was last updated
          example: "2026-02-25T10:00:00Z"

    CreateTodoRequest:
      type: object
      description: Request body for creating a new todo
      required:
        - title
      properties:
        title:
          type: string
          description: Title of the todo
          example: "Buy groceries"
        description:
          type: string
          description: Detailed description of the todo
          example: "Milk, eggs, and bread"
        completed:
          type: boolean
          description: Initial completion status
          default: false
          example: false

    UpdateTodoRequest:
      type: object
      description: Request body for updating an existing todo (partial updates supported)
      properties:
        title:
          type: string
          description: Updated title of the todo
          example: "Buy groceries"
        description:
          type: string
          description: Updated description of the todo
          example: "Milk, eggs, and bread - organic only"
        completed:
          type: boolean
          description: Updated completion status
          example: false

    TodosList:
      type: object
      description: List of todo items
      properties:
        rows:
          type: array
          description: Array of todo items
          items:
            $ref: '#/components/schemas/Todo'

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error code or type
          example: "Unauthorized"
        message:
          type: string
          description: Human-readable error message
          example: "Invalid or expired token"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token for authentication. This token is validated against
        the user service at user-service.local/api/v1/users/auth

security:
  - bearerAuth: []
