id: prov-2026-029
title: Implement full VERIFY functionality for SQL queries
status: implemented
created_at: "2026-03-13"
author: calebcowen@gmail.com
intent: >
  The VERIFY statement is currently fully parsed but never executed at runtime.
  When users write `VERIFY query CONTAINS 'password_digest'`, the rule is stored
  in the registry but the actual SQL query is never checked against it.

  This work implements the runtime verification so that VERIFY rules actually
  validate intercepted SQL queries in both MySQL and PostgreSQL proxies.

constraints:
  - MUST execute VERIFY rules in MySQL proxy at query interception time
  - MUST execute VERIFY rules in PostgreSQL proxy at query interception time
  - MUST support CONTAINS operator (substring match)
  - MUST support NOT_CONTAINS operator (negative substring match)
  - MUST support MATCHES operator (regex match with full Go regexp support)
  - MUST fail the test if VERIFY rules don't match
  - MUST provide clear error messages showing expected vs actual
  - MUST document that MATCHES with word boundaries (\\b) should be used for precise column name matching to avoid false positives with compound names like 'password_digest'
  - SHOULD include examples showing when to use CONTAINS vs MATCHES with word boundaries

affected_scope:
  - pkg/proxy/mysql/proxy.go
  - pkg/proxy/postgresql/proxy.go
  - pkg/verify/**
  - AGENTS.md
  - LINESPEC.md
  - README.md
