intent: >
  The v1.3.0 release added semantic search with embedding support, but the
  documentation only mentioned Voyage AI as the provider. The code actually
  supports both Voyage AI and OpenAI embedding providers.
  
  This documentation update clarifies that users can choose their preferred
  embedding provider (Voyage AI or OpenAI) when configuring semantic search
  for provenance records.

constraints:
  - The PROVENANCE_RECORDS.md MUST show both Voyage AI and OpenAI configuration examples
  - The README.md MUST mention both providers are supported
  - The AGENTS.md MUST document both providers with configuration examples
  - All configuration examples MUST include the correct provider-specific models

