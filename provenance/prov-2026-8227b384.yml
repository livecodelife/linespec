id: prov-2026-8227b384
title: 'Phase 3: Schema Discovery, Config File Flexibility, and Payload Formats'
status: open
created_at: "2026-03-18"
author: calebcowen@gmail.com
intent: >
  Implement Phase 3 of the LineSpec Improvement Plan, focusing on three key areas of flexibility:
  
  1. Schema Discovery Abstraction (Session 6):
     - Remove hardcoded table names (users, todos, ar_internal_metadata, schema_migrations)
     - Create SchemaDiscovery config section with auto, static, and none modes
     - Implement SchemaDiscoverer interface for MySQL, PostgreSQL, and static sources
     - Auto-discover tables from database at startup and cache to temp file
     - Support excluding specific tables from discovery
  
  2. Configuration File Flexibility (Session 7):
     - Add --config / -c CLI flag to all commands
     - Support multiple config formats: .linespec.yml, .linespec.yaml, linespec.json
     - Allow config path via LINESPEC_CONFIG environment variable
     - Make provenance directory name configurable
     - Support both .yml and .yaml extensions for provenance records
     - Allow custom config search depth
  
  3. Payload & Protocol Flexibility (Session 8):
     - Create PayloadParser interface for extensible payload formats
     - Support JSON, YAML, XML, MessagePack, and Protobuf
     - Make payload directory name configurable
     - Add custom response field extraction config
     - Remove Rails-specific auth extraction from HTTP interceptor
     - Allow custom auth extraction rules via configuration
  
  These changes will make LineSpec more flexible for different use cases while
  maintaining backward compatibility with existing .linespec.yml configurations.

constraints:
  - MUST maintain backward compatibility with existing .linespec.yml files
  - MUST NOT break existing test functionality
  - MUST support auto, static, and none modes for schema discovery
  - MUST implement PayloadParser interface for extensible payload formats
  - MUST add --config flag to all CLI commands with proper precedence
  - MUST support JSON, YAML, XML, MessagePack, and Protobuf payload formats
  - MUST remove all hardcoded table names from proxy implementations
  - MUST cache discovered schema to temp file for performance
  - MUST allow provenance directory name to be configurable
  - MUST support both .yml and .yaml extensions in provenance loader
  - MUST pass all existing tests and add new tests for new functionality
  - MUST add tests to associated_specs for each new feature

