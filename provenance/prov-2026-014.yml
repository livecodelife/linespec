id: prov-2026-014
title: Use both pre-commit and commit-msg hooks for provenance validation
status: open
created_at: "2026-03-12"
author: calebcowen@gmail.com
intent: |
    The current pre-commit hook has a fundamental design flaw: it checks committed files (HEAD) rather than staged files, and cannot access the commit message being written. This causes it to validate the wrong commit at the wrong time.
    
    This decision establishes a two-hook strategy that separates concerns properly:
    
    1. **pre-commit hook**: Runs early, validates that modified provenance records are well-formed (linting), and performs any quick checks that don't need the commit message
    
    2. **commit-msg hook**: Runs after the user writes their message, receives the commit message file as an argument, validates that provenance IDs in the message match the staged files, and enforces scope constraints
    
    This separation ensures:
    - The commit message is available when we need to extract provenance IDs
    - Staged files are checked against the correct provenance records
    - Each hook has a single, clear responsibility
    - The workflow is natural and doesn't surprise users
    
    The implementation requires adding a `--staged` flag and `--message-file` option to the `linespec provenance check` command to support checking staged files against a message file.
constraints:
    - The pre-commit hook MUST only lint modified provenance records, not check scope
    - The commit-msg hook MUST receive the message file path and check staged files against scope
    - The check command MUST support --staged and --message-file flags
    - Both hooks MUST be installed together as a pair
    - The install-hooks command MUST install both hooks
    - Hook installation MUST be idempotent (safe to run multiple times)
    - Both hooks MUST respect the local ./linespec binary when available
    - The commit-msg hook MUST exit with error code 1 if violations are found
    - The error messages MUST clearly indicate which hook blocked the commit and why
affected_scope:
    - pkg/provenance/commands.go
    - pkg/provenance/git.go
    - pkg/provenance/formatter.go
    - .git/hooks/pre-commit
    - .git/hooks/commit-msg
    - cmd/linespec/main_stable.go
