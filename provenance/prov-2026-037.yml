id: prov-2026-037
title: Release v1.2.0
status: implemented
created_at: "2026-03-14"
author: calebcowen@gmail.com
intent: >
  Release version 1.2.0 of LineSpec with new beta features and a stable bug fix.
  
  Beta Features:
  - Extended VERIFY functionality (prov-2026-030) with unified verification engine
    supporting SQL queries, HTTP headers/body/URLs, and Kafka message keys/values/headers
  - Environment variable substitution (prov-2026-028) with ${VAR_NAME} syntax to catch
    hardcoded tokens and API keys
  
  Stable Fixes:
  - Formatter empty file handling (prov-2026-036) - clearer error messages when
    attempting to commit with implemented records
  
  Version updates across all documentation and source files.

constraints:
  - The version string in main_stable.go MUST be updated to v1.2.0
  - The version string in main_beta.go MUST be updated to v1.2.0-beta
  - The README.md version strings MUST be updated to v1.2.0
  - The CHANGELOG.md MUST be updated with v1.2.0 release notes
  - The PROVENANCE_RECORDS.md install instructions MUST be updated to v1.2.0
  - The LINESPEC.md install instructions MUST be updated to v1.2.0
  - All modified files MUST be committed with the provenance record ID
  - The git tag v1.2.0 MUST be created and pushed
  - The git tag v1.2.0-beta MUST be created and pushed

