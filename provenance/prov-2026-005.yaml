id: prov-2026-005
title: "Infrastructure queries always pass through to real database, never mocked"
status: implemented
created_at: "2026-03-12"
author: "calebcowen@gmail.com"

intent: >
  A defined set of infrastructure-level database queries must always be
  forwarded transparently to the real database and must never be matched
  against mock expectations. These queries include connection setup
  commands (SET NAMES, COM_PING), schema introspection queries
  (information_schema, SHOW FULL FIELDS, SHOW TABLES), ORM internal
  bookkeeping (schema_migrations, ar_internal_metadata), and transaction
  control statements (BEGIN, COMMIT, ROLLBACK) when not generated by the
  compiler as part of a write mock sequence. Intercepting these queries
  would either break the connection handshake, prevent the ORM from
  booting correctly, or produce false failures on queries that have no
  bearing on the behavior under test. The pass-through list is a
  deliberate allowlist — anything not on it is eligible for mock matching.

constraints:
  - The pass-through list must be evaluated before any mock matching
    attempt — a whitelisted query must never reach the mock registry
  - The pass-through list must be maintained as an explicit allowlist,
    not as a blocklist of queries to intercept — new query types are
    pass-through by default until explicitly added to mock coverage
  - Changes to the pass-through list must be made in both the MySQL and
    PostgreSQL proxy implementations simultaneously if the query type
    is relevant to both protocols
  - The pass-through decision must be logged at debug level so engineers
    can verify which queries are being forwarded vs mocked during
    test development

affected_scope: []

forbidden_scope:
  - pkg/proxy/mysql/proxy.go
  - pkg/proxy/postgresql/proxy.go

