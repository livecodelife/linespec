id: prov-2026-84ab4e56
title: Switch provenance record IDs from sequential numbers to crypto random hex
status: implemented
created_at: "2026-03-16"
author: calebcowen@gmail.com
intent: >
  The current sequential ID format (prov-YYYY-NNN) causes conflicts when multiple
  engineers create provenance records concurrently. Two engineers running
  `linespec provenance create` at the same time would both get the same next
  sequence number, leading to duplicate IDs and manual resolution.

  This change switches to using 8 cryptographically random hex characters
  (e.g., prov-2026-a1b2c3d4) instead of sequential numbers. With 2^32 possible
  combinations per year (4,294,967,296), collisions are extremely unlikely
  even with concurrent creation. The year prefix is retained to limit the
  collision probability per year.

  This enables engineers to create provenance records independently without
  coordination, which is critical for distributed teams working on the same
  codebase.

constraints:
  - MUST use crypto/rand (not math/rand) for ID generation
  - MUST generate exactly 8 lowercase hex characters
  - MUST retry ID generation up to 10 times on collision before failing
  - MUST accept legacy sequential format (prov-YYYY-NNN) for existing records
  - MUST accept new hex format (prov-YYYY-XXXXXXXX) for new records
  - MUST support monorepo ID suffixes with new format (prov-YYYY-XXXXXXXX-service)
  - IDPattern regex MUST match both legacy and new formats

