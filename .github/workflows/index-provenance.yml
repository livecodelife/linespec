name: Index Provenance Embeddings

on:
  push:
    branches: [main]
    paths:
      - 'provenance/**.yml'
      - '.github/workflows/index-provenance.yml'

env:
  VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'livecodelife'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build LineSpec
        run: go build -o linespec ./cmd/linespec
      
      - name: Index new provenance records
        run: |
          echo "Indexing provenance records..."
          ./linespec provenance index 2>&1 || true
      
      - name: Commit and push updated embeddings
        run: |
          # Check if embeddings.bin exists and was modified
          if [ ! -f .linespec/embeddings.bin ]; then
            echo "⚠️ embeddings.bin does not exist, nothing to commit"
            exit 0
          fi
          
          # Check if the file has changes (staged or unstaged)
          if git diff --quiet HEAD -- .linespec/embeddings.bin && git diff --cached --quiet -- .linespec/embeddings.bin; then
            echo "✓ No changes to embeddings.bin"
          else
            echo "Committing updated embeddings.bin..."
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add .linespec/embeddings.bin
            git commit -m "Update embeddings for newly completed provenance records [skip ci]"
            git push
            echo "✓ Pushed updated embeddings.bin"
          fi
      
      - name: Check for unindexed records
        run: |
          # Check if there are any unindexed records
          output=$(./linespec provenance index --dry-run 2>&1)
          if echo "$output" | grep -q "record(s) to index"; then
            echo "⚠️ Warning: Some records were not indexed due to rate limits"
            echo "$output"
            # Don't fail the build, just warn
            exit 0
          else
            echo "✓ All records indexed successfully"
          fi
