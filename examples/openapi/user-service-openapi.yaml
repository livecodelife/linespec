openapi: 3.0.3
info:
  title: User Service API
  description: |
    Authentication and user management service.
    Provides user authentication and profile information.
  version: 1.0.0
  contact:
    name: User Service Team

servers:
  - url: http://user-service.local/api/v1
    description: Local development server

paths:
  /users/auth:
    get:
      summary: Authenticate user by token
      description: |
        Validates the Bearer token from the Authorization header and returns
        the authenticated user's information. This endpoint is called by
        the todo-api service to verify user identity.
      operationId: authenticateUser
      tags:
        - Authentication
      parameters:
        - name: Authorization
          in: header
          required: true
          description: Bearer token for authentication
          schema:
            type: string
            example: "Bearer token_abc123xyz"
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUser'
              example:
                id: 42
                email: "user@example.com"
                name: "John Doe"
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Invalid or expired token"
        '403':
          description: Forbidden - Token valid but insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Forbidden"
                message: "Insufficient permissions"

  /users/{id}:
    get:
      summary: Get user by ID
      description: Retrieve user profile information by user ID
      operationId: getUserById
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 42
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 42
                email: "user@example.com"
                name: "John Doe"
                created_at: "2026-01-01T00:00:00Z"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"
                message: "User with ID 42 not found"

components:
  schemas:
    AuthenticatedUser:
      type: object
      description: User information returned after successful authentication
      required:
        - id
        - email
        - name
      properties:
        id:
          type: integer
          description: Unique user identifier
          example: 42
        email:
          type: string
          format: email
          description: User's email address
          example: "user@example.com"
        name:
          type: string
          description: User's full name
          example: "John Doe"

    User:
      type: object
      description: Full user profile information
      required:
        - id
        - email
        - name
        - created_at
      properties:
        id:
          type: integer
          description: Unique user identifier
          example: 42
        email:
          type: string
          format: email
          description: User's email address
          example: "user@example.com"
        name:
          type: string
          description: User's full name
          example: "John Doe"
        created_at:
          type: string
          format: date-time
          description: Timestamp when user was created
          example: "2026-01-01T00:00:00Z"

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
          example: "Unauthorized"
        message:
          type: string
          description: Human-readable error message
          example: "Invalid or expired token"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token or API key for authentication

security:
  - bearerAuth: []
