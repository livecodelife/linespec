id: prov-2026-001-user-service
title: 'Fix database schema: rename password column to password_digest for has_secure_password'
status: implemented
created_at: "2026-03-12"
author: calebcowen@gmail.com
intent: |
    The user-service Rails application is failing LineSpec tests because the database schema is incompatible with Rails' has_secure_password mechanism. The migration creates a column named `password`, but has_secure_password expects `password_digest` to store the bcrypt hash. When users try to create accounts, the application crashes with HTTP 500 errors because the password handling fails.
    The fix requires renaming the column from `password` to `password_digest` in the database migration. This will allow user creation to work correctly and return the expected HTTP 201 (created) and HTTP 409 (conflict) status codes.
constraints:
    - User creation endpoint must return HTTP 201 when a new user is successfully created
    - User creation endpoint must return HTTP 409 when the email address already exists
    - Passwords must be stored as bcrypt hashes, never as plaintext
    - User creation must not fail with HTTP 500 errors due to schema incompatibility
    - Existing user accounts and their data must remain intact after the schema change
affected_scope:
    - db/migrate/20260225000001_create_users.rb
forbidden_scope: []
supersedes: ""
superseded_by: ""
related: []
associated_linespecs:
